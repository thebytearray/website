upstream origin {
    server __SITE_HOST__:80;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name thebytearray.org www.thebytearray.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://thebytearray.org$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.thebytearray.org;

    ssl_certificate     /etc/letsencrypt/live/thebytearray.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thebytearray.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    return 301 https://thebytearray.org$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name thebytearray.org;

    ssl_certificate     /etc/letsencrypt/live/thebytearray.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thebytearray.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_pass http://origin;
    }
}
