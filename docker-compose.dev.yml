# Development compose override
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  app:
    build:
      args:
        - NODE_ENV=development
    image: thebytearray/website:dev
    container_name: ${COMPOSE_PROJECT_NAME:-thebytearray}_dev
    environment:
      - NODE_ENV=development
    volumes:
      - ./src:/app/src:ro
      - ./content:/app/content:ro
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
      - "3000:3000"

  nginx:
    ports:
      - "8080:80"
