# Staging compose override
# Usage: docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d

services:
  app:
    build:
      args:
        - NODE_ENV=staging
    image: thebytearray/website:staging
    container_name: ${COMPOSE_PROJECT_NAME:-thebytearray}_staging
    environment:
      - NODE_ENV=staging

  nginx:
    container_name: ${COMPOSE_PROJECT_NAME:-thebytearray}_nginx_staging
    ports:
      - "8080:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.staging.rule=Host(`${STAGING_HOST:-staging.thebytearray.org}`)"
      - "traefik.http.routers.staging.entrypoints=web"
