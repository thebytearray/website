name: ${COMPOSE_PROJECT_NAME:-thebytearray}

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=${NODE_ENV:-production}
    image: thebytearray/website:${IMAGE_TAG:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-thebytearray}_app
    expose:
      - "80"
      - "443"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1/health.html > /dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - web

  # Nginx reverse proxy (optional - for local HTTPS testing)
  nginx:
    image: nginx:1.27-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-thebytearray}_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/container/proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/container/security.conf:/etc/nginx/conf.d/security.conf:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - web

networks:
  web:
    driver: bridge

volumes:
  nginx_cache:
    driver: local
  nginx_logs:
    driver: local
